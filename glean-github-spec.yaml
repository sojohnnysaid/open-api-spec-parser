  /search/code:
    get:
      summary: Search code
      description: |-
        Searches for query terms inside of a file. This method returns up to 100 results [per page](https://docs.github.com/rest/guides/using-pagination-in-the-rest-api).

        When searching for code, you can get text match metadata for the file **content** and file **path** fields when you pass the `text-match` media type. For more details about how to receive highlighted search results, see [Text match metadata](https://docs.github.com/rest/search/search#text-match-metadata).

        For example, if you want to find the definition of the `addClass` function inside [jQuery](https://github.com/jquery/jquery) repository, your query would look something like this:

        `q=addClass+in:file+language:js+repo:jquery/jquery`

        This query searches for the keyword `addClass` within a file's contents. The query limits the search to files where the language is JavaScript in the `jquery/jquery` repository.

        Considerations for code search:

        Due to the complexity of searching code, there are a few restrictions on how searches are performed:

        *   Only the _default branch_ is considered. In most cases, this will be the `master` branch.
        *   Only files smaller than 384 KB are searchable.
        *   You must always include at least one search term when searching source code. For example, searching for [`language:go`](https://github.com/search?utf8=%E2%9C%93&q=language%3Ago&type=Code) is not valid, while [`amazing
        language:go`](https://github.com/search?utf8=%E2%9C%93&q=amazing+language%3Ago&type=Code) is.

        > [!NOTE]
        > `repository.description`, `repository.owner.type`, and `repository.owner.node_id` are closing down on this endpoint and will return `null` in a future API version. Use the [Get a repository](https://docs.github.com/rest/repos/repos#get-a-repository) endpoint (`GET /repos/{owner}/{repo}`) to retrieve full repository metadata.

        This endpoint requires you to authenticate and limits you to 10 requests per minute.
      tags:
      - search
      operationId: search/code
      externalDocs:
        description: API method documentation
        url: https://docs.github.com/rest/search/search#search-code
      parameters:
      - name: q
        description: The query contains one or more search keywords and qualifiers. Qualifiers allow you to limit your search
          to specific areas of GitHub. The REST API supports the same qualifiers as the web interface for GitHub. To learn
          more about the format of the query, see [Constructing a search query](https://docs.github.com/rest/search/search#constructing-a-search-query).
          See "[Searching code](https://docs.github.com/search-github/searching-on-github/searching-code)" for a detailed
          list of qualifiers.
        in: query
        required: true
        schema:
          type: string
      - name: sort
        deprecated: true
        description: '**This field is closing down.** Sorts the results of your query. Can only be `indexed`, which indicates
          how recently a file has been indexed by the GitHub search infrastructure. Default: [best match](https://docs.github.com/rest/search/search#ranking-search-results)'
        in: query
        required: false
        schema:
          type: string
          enum:
          - indexed
      - name: order
        description: '**This field is closing down.** Determines whether the first search result returned is the highest number
          of matches (`desc`) or lowest number of matches (`asc`). This parameter is ignored unless you provide `sort`. '
        in: query
        deprecated: true
        required: false
        schema:
          type: string
