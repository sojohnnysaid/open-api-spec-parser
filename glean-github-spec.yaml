      parameters:
      - $ref: '#/components/parameters/owner'
      - $ref: '#/components/parameters/repo'
      - name: affiliation
        description: Filter collaborators returned by their affiliation. `outside` means all outside collaborators of an organization-owned
          repository. `direct` means all collaborators with permissions to an organization-owned repository, regardless of
          organization membership status. `all` means all collaborators the authenticated user can see.
        in: query
