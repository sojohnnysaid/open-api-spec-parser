          application/json:
            schema:
              type: object
              properties:
                permission:
                  type: string
                  description: 'The permission to grant the collaborator. **Only valid on organization-owned repositories.**
                    We accept the following permissions to be set: `pull`, `triage`, `push`, `maintain`, `admin` and you can
                    also specify a custom repository role name, if the owning organization has defined any.'
                  default: push
            examples:
              new-invitation-is-created:
                summary: Add a collaborator with triage permissions
                value:
                  permission: triage
      responses:
        '201':
          description: Response when a new invitation is created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/repository-invitation'
        '204':
          description: |-
            Response when:
            - an existing collaborator is added as a collaborator
            - an organization member is added as an individual collaborator
            - an existing team member (whose team is also a repository collaborator) is added as an individual collaborator
        '422':
          description: |-
            Response when:
            - validation failed, or the endpoint has been spammed
            - an Enterprise Managed User (EMU) account was invited to a repository in an enterprise with personal user accounts
          content:
