          properties:
            merged_at:
              type: string
              format: date-time
              nullable: false
            diff_url:
              type: string
              format: uri
              nullable: false
            html_url:
              type: string
              format: uri
              nullable: false
            patch_url:
              type: string
              format: uri
              nullable: false
            url:
              type: string
              format: uri
              nullable: false
          required:
          - diff_url
          - html_url
          - patch_url
          - url
        closed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        draft:
          type: boolean
        closed_by:
          $ref: '#/components/schemas/nullable-simple-user'
        body_html:
          type: string
        body_text:
          type: string
        timeline_url:
          type: string
          format: uri
        type:
          $ref: '#/components/schemas/issue-type'
        repository:
          $ref: '#/components/schemas/repository'
