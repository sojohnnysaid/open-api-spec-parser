        in: query
        required: false
        schema:
          type: string
      - name: type
        description: Can be the name of an issue type. If the string `*` is passed, issues with any type are accepted. If
          the string `none` is passed, issues without type are returned.
        in: query
        required: false
        schema:
          type: string
      - name: creator
        description: The user that created the issue.
        in: query
        required: false
        schema:
          type: string
      - name: mentioned
        description: A user that's mentioned in the issue.
        in: query
        required: false
        schema:
          type: string
