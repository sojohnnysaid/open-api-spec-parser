                  description: The contents of the issue.
                milestone:
                  oneOf:
                  - type: string
                  - type: integer
                    description: 'The `number` of the milestone to associate this issue with. _NOTE: Only users with push
                      access can set the milestone for new issues. The milestone is silently dropped otherwise._'
                  nullable: true
                labels:
                  type: array
                  description: 'Labels to associate with this issue. _NOTE: Only users with push access can set labels for
                    new issues. Labels are silently dropped otherwise._'
                  items:
                    oneOf:
                    - type: string
                    - type: object
                      properties:
