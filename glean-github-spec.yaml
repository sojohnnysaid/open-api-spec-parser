        in: path
        required: true
        schema:
          type: string
        x-multi-segment: true
      - name: recursive
        description: 'Setting this parameter to any value returns the objects or subtrees referenced by the tree specified
          in `:tree_sha`. For example, setting `recursive` to any of the following will enable returning objects or subtrees:
          `0`, `1`, `"true"`, and `"false"`. Omit this parameter to prevent recursively returning objects or subtrees.'
        in: query
        required: false
        schema:
          type: string
